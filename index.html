<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dravio</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<style>
body {font-family: Arial; text-align:center; margin:0;}
input,button {margin:8px; padding:10px; width:85%;}
button {background:black; color:white; border:none;}
img,video {width:200px; margin:10px;}
.section {display:none; padding:20px;}
.active {display:block;}
.nav {position:fixed; bottom:0; width:100%; display:flex; justify-content:space-around; background:#fff; padding:10px;}
.logo {font-size:35px; font-weight:bold; margin-top:50px;}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="section active">
  <div class="logo">DRAVIO</div>
  <button onclick="show('login')">Start</button>
</div>

<!-- LOGIN -->
<div id="login" class="section">
  <h2>Login / Signup</h2>
  <input id="phone" placeholder="+91xxxxxxxxxx">
  <div id="recaptcha"></div>
  <button onclick="sendOTP()">Send OTP</button>
</div>

<!-- OTP -->
<div id="otpBox" class="section">
  <input id="otp" placeholder="Enter OTP">
  <button onclick="verifyOTP()">Verify</button>
</div>

<!-- PROFILE SETUP -->
<div id="setup" class="section">
  <h2>Create Profile</h2>
  <input id="name" placeholder="Name">
  <input id="bio" placeholder="Bio">
  <input type="file" id="photo">
  <button onclick="saveProfile()">Continue</button>
</div>

<!-- HOME -->
<div id="home" class="section">
  <h2>Home</h2>

  <h3>Upload Post</h3>
  <input type="file" id="imageUpload">
  <button onclick="uploadPost()">Post</button>

  <h3>Creato 🎬</h3>
  <input type="file" id="videoUpload">
  <button onclick="uploadVideo()">Upload</button>

  <div id="feed"></div>
</div>

<!-- SEARCH -->
<div id="search" class="section">
  <h2>Search</h2>
  <input id="searchInput" onkeyup="searchUser()">
  <div id="results"></div>
</div>

<!-- CHAT -->
<div id="chat" class="section">
  <h2>Chat</h2>
  <input id="msg">
  <button onclick="sendMsg()">Send</button>
  <div id="chatBox"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
  <h2>Profile</h2>
  <p id="pname"></p>
  <p id="pbio"></p>
  <img id="pphoto">
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="show('home')">🏠</button>
  <button onclick="show('search')">🔍</button>
  <button onclick="show('chat')">💬</button>
  <button onclick="show('profile')">👤</button>
</div>

<script>

// 🔥 APNA FIREBASE CONFIG YAHA DALO
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_MSG_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha');

// SCREEN SWITCH
function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'))
  document.getElementById(id).classList.add('active')
}

// OTP LOGIN
function sendOTP(){
  let phone = document.getElementById("phone").value;
  auth.signInWithPhoneNumber(phone, window.recaptchaVerifier)
  .then(res=>{
    window.confirmationResult = res;
    show('otpBox');
  })
  .catch(e=>alert(e.message));
}

function verifyOTP(){
  let code = document.getElementById("otp").value;
  confirmationResult.confirm(code).then(res=>{
    checkUser(res.user.uid);
  });
}

// USER CHECK
function checkUser(uid){
  db.collection("users").doc(uid).get().then(doc=>{
    if(doc.exists){
      loadHome();
    } else {
      show('setup');
    }
  });
}

// SAVE PROFILE
function saveProfile(){
  let user = auth.currentUser;
  let file = document.getElementById("photo").files[0];

  let ref = storage.ref("profile/"+user.uid);
  ref.put(file).then(()=>{
    ref.getDownloadURL().then(url=>{
      db.collection("users").doc(user.uid).set({
        name:document.getElementById("name").value,
        bio:document.getElementById("bio").value,
        photo:url
      });
      loadHome();
    });
  });
}

// LOAD HOME
function loadHome(){
  show('home');
  loadFeed();

  let user=auth.currentUser;
  db.collection("users").doc(user.uid).get().then(doc=>{
    document.getElementById("pname").innerText=doc.data().name;
    document.getElementById("pbio").innerText=doc.data().bio;
    document.getElementById("pphoto").src=doc.data().photo;
  });
}

// POST IMAGE
function uploadPost(){
  let file = document.getElementById("imageUpload").files[0];
  let ref = storage.ref("posts/"+Date.now());
  ref.put(file).then(()=>{
    ref.getDownloadURL().then(url=>{
      db.collection("posts").add({image:url});
      loadFeed();
    });
  });
}

// VIDEO UPLOAD
function uploadVideo(){
  let file = document.getElementById("videoUpload").files[0];
  let ref = storage.ref("videos/"+Date.now());
  ref.put(file).then(()=>{
    ref.getDownloadURL().then(url=>{
      db.collection("videos").add({video:url});
    });
  });
}

// FEED
function loadFeed(){
  db.collection("posts").onSnapshot(snap=>{
    let feed=document.getElementById("feed");
    feed.innerHTML="";
    snap.forEach(doc=>{
      feed.innerHTML+=`<img src="${doc.data().image}">`;
    });
  });
}

// SEARCH
function searchUser(){
  let val=document.getElementById("searchInput").value;
  db.collection("users").where("name","==",val).get().then(snap=>{
    let res=document.getElementById("results");
    res.innerHTML="";
    snap.forEach(doc=>{
      res.innerHTML+=`${doc.data().name} <button onclick="follow('${doc.id}')">Follow</button>`;
    });
  });
}

// FOLLOW
function follow(id){
  let uid=auth.currentUser.uid;
  db.collection("follow").add({from:uid,to:id});
  alert("Followed");
}

// CHAT
function sendMsg(){
  let msg=document.getElementById("msg").value;
  db.collection("chat").add({msg:msg});
}

// REALTIME CHAT
db.collection("chat").onSnapshot(snap=>{
  let box=document.getElementById("chatBox");
  box.innerHTML="";
  snap.forEach(doc=>{
    box.innerHTML+=`<div>${doc.data().msg}</div>`;
  });
});

</script>

</body>
</html>
