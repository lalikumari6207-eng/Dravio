                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }<!DOCTYPE html>
<html>
<head>
  <title>Dravio - Lyzonix</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <style>
    body { margin:0; font-family:Arial; background:#000; color:#fff; }

    /* TOP BAR */
    .top {
      position:fixed; top:0; width:100%;
      background:#111; padding:10px;
      display:flex; justify-content:space-between;
      align-items:center;
    }

    .top h2 { color:#ff2d55; margin:0; }

    /* NAV */
    .nav {
      position:fixed; bottom:0;
      width:100%; background:#111;
      display:flex; justify-content:space-around;
      padding:10px;
    }

    .nav button {
      background:none; border:none;
      color:white; font-size:18px;
    }

    /* SCREENS */
    .screen { padding-top:70px; padding-bottom:70px; display:none; }

    .active { display:block; }

    input, button {
      width:90%;
      margin:10px;
      padding:12px;
      border-radius:10px;
      border:none;
    }

    button { background:#ff2d55; color:white; }

    /* POSTS */
    .post {
      background:#111;
      margin:10px;
      padding:10px;
      border-radius:10px;
    }

    img { width:100%; border-radius:10px; }

    /* SEARCH */
    .searchBox {
      width:90%;
      margin:10px;
      padding:10px;
    }
  </style>
</head>

<body>

<!-- TOP -->
<div class="top">
  <h2>DRAVIO</h2>
  <span>Lyzonix</span>
</div>

<!-- LOGIN -->
<div id="login" class="screen active">
  <h3>Login / Signup</h3>

  <input id="email" placeholder="Email or Phone">
  <input id="password" placeholder="Password">

  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
</div>

<!-- HOME FEED -->
<div id="home" class="screen">
  <h3>Feed</h3>
  <div id="posts"></div>
</div>

<!-- SEARCH -->
<div id="search" class="screen">
  <input class="searchBox" placeholder="Search users...">
</div>

<!-- UPLOAD -->
<div id="upload" class="screen">
  <input id="caption" placeholder="Write caption">
  <input type="file" id="file">
  <button onclick="post()">Upload Post</button>
</div>

<!-- PROFILE -->
<div id="profile" class="screen">
  <h3>Your Profile</h3>
  <p id="userInfo"></p>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="show('home')">🏠</button>
  <button onclick="show('search')">🔍</button>
  <button onclick="show('upload')">➕</button>
  <button onclick="show('profile')">👤</button>
</div>

<script>
/* FIREBASE CONFIG (ADD YOURS) */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* NAV */
function show(page){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

/* SIGNUP */
function signup(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, pass)
  .then(u=>{
    alert("Account Created");
    show('home');
    loadPosts();
  });
}

/* LOGIN */
function login(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, pass)
  .then(u=>{
    alert("Logged In");
    show('home');
    loadPosts();
  });
}

/* POST */
function post(){
  let caption = document.getElementById("caption").value;
  let file = document.getElementById("file").files[0];

  let reader = new FileReader();
  reader.onload = function(){
    db.collection("posts").add({
      caption: caption,
      image: reader.result,
      time: Date.now()
    });
  }
  reader.readAsDataURL(file);

  alert("Posted!");
}

/* LOAD POSTS */
function loadPosts(){
  db.collection("posts").orderBy("time","desc")
  .onSnapshot(snapshot=>{
    let html = "";
    snapshot.forEach(doc=>{
      let p = doc.data();
      html += `
        <div class="post">
          <p>${p.caption}</p>
          <img src="${p.image}">
        </div>
      `;
    });
    document.getElementById("posts").innerHTML = html;
  });
}
</script>

</body>
</html>
